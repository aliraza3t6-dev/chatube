{% extends "base.html" %}

{% block title %}Private Chat{% endblock %}

{% block navbar %}{% endblock %}
{% block bottom_nav %}{% endblock %}

{% block content %}

<div class="chat-wrapper">


    <div class="chat-header">
        <a href="{% url 'home' %}" class="back-btn">← Back</a>
        <h3>Chat with {{ r.username }}</h3>
    </div>

    <div id="chatbox" class="chat-messages">

        {% for message in messages %}
            <div class="message {% if message.sender == request.user %}sender-message{% else %}receiver-message{% endif %}">
                <p>{{ message.content }}</p>
            </div>
        {% endfor %}

    </div>

    
    <div class="chat-form">
        <input id="messageInput"
               type="text"
               class="chat-input"
               placeholder="Type your message..."
               autocomplete="off">
        <button id="sendBtn" class="send-btn">Send</button>
    </div>

</div>

<style>

/* Remove bottom padding */
body{
    padding-bottom:0 !important;
}

/* Layout full height */
.chat-wrapper{
    display:flex;
    flex-direction:column;
    height:100vh;
    padding:15px;
}

/* Header */
.chat-header{
    margin-bottom:10px;
}

.back-btn{
    color:#0d6efd;
    text-decoration:none;
    display:inline-block;
    margin-bottom:5px;
}

/* Chat box flexible */
.chat-messages{
    flex:1;
    overflow-y:auto;
    background:#fff;
    border-radius:8px;
    padding:15px;
}

/* Messages */
.message{
    margin-bottom:10px;
    padding:8px 12px;
    border-radius:8px;
    max-width:70%;
}

.sender-message{
    background:#d1e7ff;
    margin-left:auto;
    text-align:right;
}

.receiver-message{
    background:#e5e5e5;
    margin-right:auto;
}

/* Input fixed at bottom */
.chat-form{
    display:flex;
    gap:10px;
    margin-top:10px;
}

.chat-input{
    flex:1;
    padding:10px;
    border-radius:20px;
    border:1px solid #ccc;
}

.send-btn{
    padding:10px 18px;
    border-radius:20px;
    border:none;
    background:#0d6efd;
    color:#fff;
}

</style>

<script>
const chatBox = document.getElementById("chatbox");
const input = document.getElementById("messageInput");
const sendBtn = document.getElementById("sendBtn");

const socket = new WebSocket(
    "ws://" + window.location.host + "/ws/chat/{{ r.username }}/"
);


chatBox.scrollTop = chatBox.scrollHeight;

socket.onmessage = function(e) {
    const data = JSON.parse(e.data);

    const div = document.createElement("div");
    div.classList.add("message");

    if (data.sender === "{{ request.user.username }}") {
        div.classList.add("sender-message");
    } else {
        div.classList.add("receiver-message");
    }

    div.innerHTML = `<p>${data.message}</p>`;
    chatBox.appendChild(div);

    chatBox.scrollTop = chatBox.scrollHeight;
};

function sendMessage(){
    const message = input.value;
    if (message.trim() === "") return;

    socket.send(JSON.stringify({
        "message": message,
        "sender": "{{ request.user.username }}"
    }));

    input.value = "";
}

sendBtn.onclick = sendMessage;

input.addEventListener("keyup", function(e){
    if(e.key === "Enter"){
        sendMessage();
    }
});
</script>

{% endblock %}
