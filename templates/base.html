<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>
        {% block title %}
        {% endblock %}
    </title>

  
    <link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
      /* RESET */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        background-color: #121212;
        color: #ffffff;
        padding-bottom: 75px; /* bottom nav space */
      }

      /* TOP NAVBAR */
      .navbar {
        background-color: #1e1e1e;
        padding: 15px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
      }

      .container-fluid {
        width: 100%;
      }

      .input-group {
        display: flex;
        align-items: center;
        max-width: 400px;
      }

      .input-group-text {
        background-color: #2a2a2a;
        color: #fff;
        padding: 10px 14px;
        border: 1px solid #444;
        border-right: none;
        border-radius: 5px 0 0 5px;
      }

      .form-control {
        width: 100%;
        padding: 10px;
        border: 1px solid #444;
        background-color: #1a1a1a;
        color: #fff;
        border-radius: 0 5px 5px 0;
        outline: none;
      }

      .form-control::placeholder {
        color: #aaa;
      }

      button {
        background-color: #2a2a2a;
        border: 1px solid #444;
        padding: 8px 16px;
        border-radius: 5px;
        cursor: pointer;
      }

      button a {
        color: #fff;
        text-decoration: none;
      }

      button:hover {
        background-color: #3a3a3a;
      }

      /* BOTTOM NAVBAR */
      .bottom-nav {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 65px;
        background-color: #1e1e1e;
        border-top: 1px solid #333;
        display: flex;
        justify-content: space-around;
        align-items: center;
        z-index: 1000;
      }

      .bottom-nav a {
        color: #888;
        text-decoration: none;
        font-size: 12px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .bottom-nav a i {
        font-size: 20px;
        margin-bottom: 4px;
      }

      .bottom-nav a.active,
      .bottom-nav a:hover {
        color: #0d6efd;
      }
    </style>
  </head>

  <body data-bs-theme="dark">

    {% block navbar %}
    <nav class="navbar">
      <form action="/searched/" class="container-fluid">
        <div class="input-group">
          <span class="input-group-text">@</span>
          <input type="text" name="query" class="form-control"
            placeholder="Username">
        </div>
      </form>

      {% if user.is_authenticated %}
        <button><a href="{% url 'logout' %}">logout</a></button>
      {% else %}
        <button><a href="{% url 'login' %}">login</a></button>
      {% endif %}
    </nav>
    {% endblock %}

    {% block content %}
    {% endblock %}
{% block bottom_nav %}
   
    <nav class="bottom-nav">
     <a href="/"
     class="{% if request.path == '/' %}active{% endif %}">
    <i class="fa-solid fa-house"></i>
    <span>Home</span>
  </a>

  <a href="/global-chat/"
     class="{% if '/global-chat' in request.path %}active{% endif %}">
    <i class="fa-solid fa-globe"></i>
    <span>Global</span>
  </a>
    </nav>
{% endblock %}
  </body>
</html>
