{% extends "base.html" %}
{% block navbar %}
{% endblock %}

{% block content %}

<style>
  .container {
    max-width: 400px;
    margin: 60px auto;
    padding: 25px;
    background-color: #1e1e1e;
    border-radius: 8px;
    border: 1px solid #333;
  }

  h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #ffffff;
  }

  .mb-3 {
    margin-bottom: 15px;
  }

  .form-label {
    display: block;
    margin-bottom: 6px;
    color: #cccccc;
  }

  .form-control {
    width: 100%;
    padding: 10px;
    background-color: #121212;
    border: 1px solid #444;
    border-radius: 5px;
    color: #ffffff;
    outline: none;
  }

  .form-control:focus {
    border-color: #0d6efd;
  }

  .btn {
    width: 100%;
    padding: 10px;
    background-color: #0d6efd;
    border: none;
    border-radius: 5px;
    color: #ffffff;
    cursor: pointer;
    margin-top: 10px;
  }

  .btn:hover {
    background-color: #0b5ed7;
  }

  a {
    display: block;
    text-align: center;
    margin-top: 15px;
    color: #0d6efd;
    text-decoration: none;
  }

  a:hover {
    text-decoration: underline;
  }
</style>

<div class=container>
<h2>Register Page</h2>
<form method ='post'>
    {% csrf_token %}
  <div class="mb-3">
    <label for="exampleInputEmail1" class="form-label">Username</label>
    <input type="text" class="form-control" name="username" id="exampleInputEmail1" aria-describedby="emailHelp">
  </div>
  <div class="mb-3">
    <label for="exampleInputPassword1" class="form-label">Password</label>
    <input type="password" class="form-control" name="password" id="exampleInputPassword1">
  </div>
  <button type="submit" class="btn btn-primary">signup</button>
</form>
<a href="{% url "login" %}">login here</a>
</div>

{% endblock %}
